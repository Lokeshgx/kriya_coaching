<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#grad1)" rx="20"/>
  <!-- K Letter -->
  <text x="100" y="140" font-size="140" font-weight="bold" font-family="Poppins, sans-serif" fill="white" text-anchor="middle">K</text>
  <!-- Accent line -->
  <line x1="40" y1="180" x2="160" y2="180" stroke="white" stroke-width="3" opacity="0.7"/>
</svg>